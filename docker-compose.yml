services:
  backend:
    build: ./backend
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app
  frontend:
    build: ./frontend
    ports: ["3001:3000"]
    volumes:
      - ./frontend:/app
